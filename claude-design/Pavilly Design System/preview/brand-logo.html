<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="_card.css">
<style>
  .row6 { display: flex; gap: 14px; align-items: stretch; }
  .panel {
    flex: 1; padding: 18px;
    border-radius: 16px;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px;
    min-height: 140px;
  }
  .panel.light { background: #fafaf7; border: 1px solid var(--border-1); }
  .panel.dark  { background: #11110e; }
  .panel.brand { background: #35858E; }
  .panel .meta {
    font-family: var(--font-mono); font-size: 10px;
    text-transform: uppercase; letter-spacing: 0.1em;
    margin-top: 6px;
  }
  .panel.light .meta { color: var(--fg-3); }
  .panel.dark  .meta { color: rgba(255,255,255,0.5); }
  .panel.brand .meta { color: rgba(255,255,255,0.7); }
</style>
</head>
<body>
<div class="card">
  <div class="row6">
    <div class="panel light">
      <img src="../assets/pavilly-logo.svg" alt="Pavilly" style="height:42px;"/>
      <div class="meta">on light</div>
    </div>
    <div class="panel dark">
      <img src="../assets/pavilly-logo-dark.svg" alt="Pavilly" style="height:42px;"/>
      <div class="meta">on dark</div>
    </div>
    <div class="panel brand">
      <img src="../assets/pavilly-mark.svg" alt="Pavilly" style="height:54px;border-radius:14px;"/>
      <div class="meta">app icon</div>
    </div>
  </div>
  <div style="display:flex;gap:24px;font-size:12px;color:var(--fg-2);line-height:1.5;padding-top:4px;">
    <div><strong style="color:var(--fg-1);">Clear space</strong> · ≥ ¼ mark height on every side</div>
    <div><strong style="color:var(--fg-1);">Min size</strong> · 24px digital, 8mm print</div>
    <div><strong style="color:var(--fg-1);">Wordmark</strong> · always lowercase</div>
  </div>
</div>
</body>
</html>
