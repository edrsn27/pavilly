<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="_card.css">
<style>
  .list {
    border-radius: 16px;
    background: var(--surface);
    border: 1px solid var(--border-1);
    overflow: hidden;
  }
  .row5 {
    display: grid;
    grid-template-columns: 44px 1fr auto 60px;
    align-items: center;
    gap: 14px;
    padding: 14px 18px;
    border-bottom: 1px solid var(--border-1);
  }
  .row5:last-child { border-bottom: none; }
  .row5:hover { background: var(--surface-2); }
  .row5.selected { background: var(--accent-soft); }
  .row5 .av {
    width: 44px; height: 44px; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; background: var(--surface-2);
  }
  .row5 .av.coffee { background: linear-gradient(135deg, #fde68a, #f59e0b); }
  .row5 .av.bread  { background: linear-gradient(135deg, #fed7aa, #ea580c); }
  .row5 .av.tea    { background: linear-gradient(135deg, #d0e3e6, #35858E); }
  .row5 .name { font-size: 15px; font-weight: 500; color: var(--fg-1); }
  .row5 .sub  { font-size: 12px; color: var(--fg-3); font-family: var(--font-mono); margin-top: 2px; }
  .row5 .amt  { font-family: var(--font-mono); font-variant-numeric: tabular-nums; font-size: 15px; font-weight: 600; }
  .row5 .qty  {
    font-family: var(--font-mono); font-variant-numeric: tabular-nums;
    font-size: 13px; color: var(--fg-2);
    text-align: right;
  }
</style>
</head>
<body>
<div class="card">
  <div class="list">
    <div class="row5">
      <div class="av coffee">☕️</div>
      <div>
        <div class="name">Iced oat latte</div>
        <div class="sub">Large · extra shot</div>
      </div>
      <div class="qty">×2</div>
      <div class="amt">$9.00</div>
    </div>
    <div class="row5 selected">
      <div class="av bread">🥐</div>
      <div>
        <div class="name">Butter croissant</div>
        <div class="sub">Warmed</div>
      </div>
      <div class="qty">×1</div>
      <div class="amt">$3.75</div>
    </div>
    <div class="row5">
      <div class="av tea">🍵</div>
      <div>
        <div class="name">Jasmine green tea</div>
        <div class="sub">Hot · medium</div>
      </div>
      <div class="qty">×1</div>
      <div class="amt">$3.50</div>
    </div>
  </div>
</div>
</body>
</html>
