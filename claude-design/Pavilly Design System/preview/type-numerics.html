<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="_card.css">
<style>
  .price-card {
    background: var(--pavilly-ink-900);
    color: #fff;
    border-radius: 20px;
    padding: 28px 32px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .price-card .label-sm {
    font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--pavilly-teal-300); font-weight: 600;
  }
  .price-card .total {
    font-family: var(--font-numeric); font-variant-numeric: tabular-nums;
    font-size: 72px; line-height: 1; font-weight: 600; letter-spacing: -0.03em;
  }
  .price-card .total .cents { font-size: 32px; opacity: 0.7; vertical-align: 8px; margin-left: 2px; }
  .price-card .sub {
    font-family: var(--font-mono); font-size: 13px; color: rgba(255,255,255,0.55);
  }
  .lineitems { display: grid; grid-template-columns: 1fr auto auto; gap: 6px 18px; }
  .lineitems .name { font-size: 14px; color: var(--fg-2); }
  .lineitems .qty { font-family: var(--font-mono); font-size: 13px; color: var(--fg-3); font-variant-numeric: tabular-nums; }
  .lineitems .amt { font-family: var(--font-mono); font-size: 14px; color: var(--fg-1); font-variant-numeric: tabular-nums; font-weight: 500; text-align: right; }
</style>
</head>
<body>
<div class="card" style="flex-direction:row;align-items:stretch;gap:20px;">
  <div class="price-card" style="flex:1;">
    <div class="label-sm">Total due</div>
    <div class="total">$48<span class="cents">.20</span></div>
    <div class="sub">Cash · Drawer #2</div>
  </div>
  <div style="flex:1;padding:8px 0;">
    <div class="label" style="margin-bottom:10px;">Receipt detail</div>
    <div class="lineitems">
      <div class="name">Iced latte</div><div class="qty">×2</div><div class="amt">9.00</div>
      <div class="name">Croissant</div><div class="qty">×1</div><div class="amt">4.50</div>
      <div class="name">Sourdough loaf</div><div class="qty">×3</div><div class="amt">27.00</div>
      <div class="name" style="color:var(--fg-1);font-weight:500;border-top:1px solid var(--border-1);padding-top:8px;margin-top:4px;">Subtotal</div>
      <div class="qty" style="border-top:1px solid var(--border-1);padding-top:8px;margin-top:4px;"></div>
      <div class="amt" style="border-top:1px solid var(--border-1);padding-top:8px;margin-top:4px;font-weight:600;">40.50</div>
      <div class="name">Tax (8.5%)</div><div class="qty"></div><div class="amt">3.44</div>
      <div class="name">Tip</div><div class="qty"></div><div class="amt">4.26</div>
    </div>
  </div>
</div>
</body>
</html>
