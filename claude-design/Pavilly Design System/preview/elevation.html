<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="_card.css">
<style>
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 18px; padding: 8px 0 20px; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .box { width: 96px; height: 64px; background: #fff; border-radius: 14px; }
  .tok { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); }
  .name { font-size: 13px; font-weight: 600; }
</style>
</head>
<body>
<div class="card" style="background:var(--surface-2);">
  <div class="grid">
    <div class="item">
      <div class="box" style="box-shadow:0 1px 2px rgba(17,17,14,0.04);"></div>
      <div class="name">xs</div><div class="tok">subtle border</div>
    </div>
    <div class="item">
      <div class="box" style="box-shadow:0 1px 2px rgba(17,17,14,0.06), 0 1px 3px rgba(17,17,14,0.04);"></div>
      <div class="name">sm</div><div class="tok">cards at rest</div>
    </div>
    <div class="item">
      <div class="box" style="box-shadow:0 4px 12px rgba(17,17,14,0.06), 0 2px 4px rgba(17,17,14,0.04);"></div>
      <div class="name">md</div><div class="tok">dropdowns</div>
    </div>
    <div class="item">
      <div class="box" style="box-shadow:0 12px 32px rgba(17,17,14,0.10), 0 4px 8px rgba(17,17,14,0.04);"></div>
      <div class="name">lg</div><div class="tok">sheets, FAB</div>
    </div>
    <div class="item">
      <div class="box" style="box-shadow:0 24px 56px rgba(17,17,14,0.16), 0 8px 16px rgba(17,17,14,0.06);"></div>
      <div class="name">xl</div><div class="tok">modals</div>
    </div>
  </div>
</div>
</body>
</html>
