<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="_card.css">
<style>
  .stack { display: grid; grid-template-columns: 60px 1fr 70px; gap: 8px 16px; align-items: center; }
  .tok { font-family: var(--font-mono); font-size: 12px; color: var(--fg-3); }
  .bar { background: var(--pavilly-teal-100); border-radius: 4px; height: 14px; }
  .px  { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); text-align: right; }
</style>
</head>
<body>
<div class="card">
  <div class="stack">
    <div class="tok">space-1</div>  <div class="bar" style="width:4px;"></div>   <div class="px">4px</div>
    <div class="tok">space-2</div>  <div class="bar" style="width:8px;"></div>   <div class="px">8px</div>
    <div class="tok">space-3</div>  <div class="bar" style="width:12px;"></div>  <div class="px">12px</div>
    <div class="tok">space-4</div>  <div class="bar" style="width:16px;"></div>  <div class="px">16px</div>
    <div class="tok">space-5</div>  <div class="bar" style="width:20px;"></div>  <div class="px">20px</div>
    <div class="tok">space-6</div>  <div class="bar" style="width:24px;"></div>  <div class="px">24px</div>
    <div class="tok">space-8</div>  <div class="bar" style="width:32px;"></div>  <div class="px">32px</div>
    <div class="tok">space-10</div> <div class="bar" style="width:40px;"></div>  <div class="px">40px</div>
    <div class="tok">space-12</div> <div class="bar" style="width:48px;"></div>  <div class="px">48px</div>
    <div class="tok">space-16</div> <div class="bar" style="width:64px;"></div>  <div class="px">64px</div>
    <div class="tok">space-20</div> <div class="bar" style="width:80px;"></div>  <div class="px">80px</div>
  </div>
</div>
</body>
</html>
