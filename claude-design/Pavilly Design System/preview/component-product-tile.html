<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="_card.css">
<style>
  .row4 { display: flex; gap: 16px; align-items: stretch; }
  .tile {
    width: 160px; padding: 14px;
    border-radius: 20px;
    background: var(--surface);
    border: 1px solid var(--border-1);
    display: flex; flex-direction: column; gap: 10px;
    box-shadow: 0 1px 2px rgba(17,17,14,0.04);
    cursor: pointer;
    transition: transform 80ms var(--ease-out), box-shadow 140ms var(--ease-out);
  }
  .tile:hover { box-shadow: 0 4px 12px rgba(17,17,14,0.08); }
  .tile:active { transform: scale(0.98); }
  .tile .img {
    aspect-ratio: 1 / 1;
    border-radius: 14px;
    background: linear-gradient(135deg, #d0e3e6 0%, #7eb4bc 100%);
    display: flex; align-items: center; justify-content: center;
    font-size: 40px;
  }
  .tile.icon-coffee .img { background: linear-gradient(135deg, #fde68a 0%, #f59e0b 100%); }
  .tile.icon-bread .img  { background: linear-gradient(135deg, #fed7aa 0%, #ea580c 100%); }
  .tile.icon-merch .img  { background: linear-gradient(135deg, #c7d2fe 0%, #6366f1 100%); }
  .tile .name { font-size: 14px; font-weight: 600; }
  .tile .price { font-family: var(--font-mono); font-variant-numeric: tabular-nums; font-size: 15px; font-weight: 600; color: var(--fg-1); }
  .tile .meta { font-size: 11px; color: var(--fg-3); font-family: var(--font-mono); }

  .stepper {
    display: inline-flex; align-items: center;
    border-radius: 14px; background: var(--surface-2);
    overflow: hidden;
    height: 48px;
  }
  .stepper button {
    width: 44px; height: 100%; border: none; background: transparent;
    font-size: 22px; font-weight: 600; color: var(--fg-1);
    cursor: pointer;
  }
  .stepper button:hover { background: var(--surface-3); }
  .stepper .qty {
    font-family: var(--font-mono); font-variant-numeric: tabular-nums;
    font-size: 17px; font-weight: 600;
    min-width: 36px; text-align: center;
  }
  .label-mini { font-size: 11px; color: var(--fg-3); font-family: var(--font-mono); }
</style>
</head>
<body>
<div class="card">
  <div class="row4">
    <div class="tile icon-coffee">
      <div class="img">☕️</div>
      <div class="name">Iced oat latte</div>
      <div class="price">$4.50</div>
      <div class="meta">SKU · DRK-021</div>
    </div>
    <div class="tile icon-bread">
      <div class="img">🥐</div>
      <div class="name">Butter croissant</div>
      <div class="price">$3.75</div>
      <div class="meta">12 in stock</div>
    </div>
    <div class="tile icon-merch">
      <div class="img">👕</div>
      <div class="name">Pavilly tee</div>
      <div class="price">$24.00</div>
      <div class="meta">Sizes · S–XL</div>
    </div>
    <div style="display:flex;flex-direction:column;gap:10px;justify-content:center;">
      <div class="label-mini">stepper · 48px</div>
      <div class="stepper">
        <button>−</button>
        <div class="qty">2</div>
        <button>+</button>
      </div>
      <div class="label-mini" style="margin-top:6px;">stepper · large</div>
      <div class="stepper" style="height:56px;">
        <button style="width:52px;font-size:26px;">−</button>
        <div class="qty" style="font-size:20px;min-width:44px;">12</div>
        <button style="width:52px;font-size:26px;">+</button>
      </div>
    </div>
  </div>
</div>
</body>
</html>
