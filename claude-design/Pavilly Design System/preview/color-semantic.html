<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="_card.css">
<style>
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
  .tile {
    border-radius: 14px;
    padding: 16px;
    display: flex; flex-direction: column; gap: 6px;
    min-height: 130px;
    border: 1px solid var(--border-1);
  }
  .tile .swatch {
    height: 40px;
    border-radius: 8px;
    margin-bottom: 4px;
  }
  .tile .name { font-size: 14px; font-weight: 600; }
  .tile .hex  { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); }
  .tile .use  { font-size: 12px; color: var(--fg-2); margin-top: 2px; }
  .pair { display: flex; gap: 6px; align-items: center; padding: 6px 10px; border-radius: 999px; font-size: 12px; font-weight: 500; width: fit-content; }
</style>
</head>
<body>
<div class="card">
  <div class="grid">
    <div class="tile">
      <div class="swatch" style="background:#35858E;"></div>
      <div class="name">Success</div>
      <div class="hex">#35858E</div>
      <div class="pair" style="background:#ecf3f4;color:#235559;">Order complete</div>
    </div>
    <div class="tile">
      <div class="swatch" style="background:#f59e0b;"></div>
      <div class="name">Warning</div>
      <div class="hex">#F59E0B</div>
      <div class="pair" style="background:#fbf2e0;color:#8a5a14;">Low stock</div>
    </div>
    <div class="tile">
      <div class="swatch" style="background:#b85050;"></div>
      <div class="name">Danger</div>
      <div class="hex">#EF4444</div>
      <div class="pair" style="background:#f8ecec;color:#9a3a3a;">Card declined</div>
    </div>
    <div class="tile">
      <div class="swatch" style="background:#35858E;"></div>
      <div class="name">Info</div>
      <div class="hex">#3B82F6</div>
      <div class="pair" style="background:#ecf3f4;color:#235559;">Sync running</div>
    </div>
  </div>
</div>
</body>
</html>
