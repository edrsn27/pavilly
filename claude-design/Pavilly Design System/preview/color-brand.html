<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="_card.css">
<style>
  .ramp { display: grid; grid-template-columns: repeat(11, 1fr); gap: 6px; }
  .swatch {
    aspect-ratio: 1 / 1.15;
    border-radius: 10px;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 8px;
    color: rgba(255,255,255,0.95);
    font-family: var(--font-mono);
    font-size: 10px;
    line-height: 1.2;
  }
  .swatch.light { color: rgba(10, 27, 29, 0.75); }
  .swatch .step { font-weight: 600; font-size: 11px; }
  .swatch .hex { opacity: 0.8; font-size: 9.5px; }
  .hero {
    background: #35858E;
    color: #fff;
    border-radius: 14px;
    padding: 18px 20px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .hero .name { font-size: 20px; font-weight: 600; letter-spacing: -0.01em; }
  .hero .tag { font-family: var(--font-mono); font-size: 12px; opacity: 0.85; }
</style>
</head>
<body>
<div class="card">
  <div class="hero">
    <div>
      <div style="font-size:11px;opacity:0.7;letter-spacing:0.1em;text-transform:uppercase;font-weight:600;">Brand · Primary</div>
      <div class="name">Teal 500</div>
    </div>
    <div class="tag">#35858E</div>
  </div>
  <div class="ramp">
    <div class="swatch light" style="background:#ecf3f4;"><div class="step">50</div><div class="hex">ECF3F4</div></div>
    <div class="swatch light" style="background:#d0e3e6;"><div class="step">100</div><div class="hex">D0E3E6</div></div>
    <div class="swatch light" style="background:#a8cdd2;"><div class="step">200</div><div class="hex">A8CDD2</div></div>
    <div class="swatch light" style="background:#7eb4bc;"><div class="step">300</div><div class="hex">7EB4BC</div></div>
    <div class="swatch" style="background:#559aa4;"><div class="step">400</div><div class="hex">559AA4</div></div>
    <div class="swatch" style="background:#35858E;"><div class="step">500</div><div class="hex">35858E</div></div>
    <div class="swatch" style="background:#2b6c73;"><div class="step">600</div><div class="hex">2B6C73</div></div>
    <div class="swatch" style="background:#235559;"><div class="step">700</div><div class="hex">235559</div></div>
    <div class="swatch" style="background:#1c4347;"><div class="step">800</div><div class="hex">1C4347</div></div>
    <div class="swatch" style="background:#143034;"><div class="step">900</div><div class="hex">143034</div></div>
    <div class="swatch" style="background:#0a1b1d;"><div class="step">950</div><div class="hex">0A1B1D</div></div>
  </div>
</div>
</body>
</html>
